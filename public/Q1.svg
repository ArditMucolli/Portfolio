<?xml version="1.0" encoding="UTF-8"?><svg id="a" xmlns="http://www.w3.org/2000/svg" width="600" height="340" viewBox="0 0 600 340"><defs><style>.c{letter-spacing:-.07em;}.d{fill:none;stroke:#00b04f;stroke-miterlimit:10;stroke-width:5px;}.e{fill:#040404;font-family:ArialMT, Arial;font-size:17px;}.f{letter-spacing:-.02em;}.g{letter-spacing:-.04em;}.h{letter-spacing:-.06em;}</style></defs><text id="b" class="e" transform="translate(22.5 36.17)"><tspan x="0" y="0">The</tspan><tspan class="f" x="29.29" y="0"> </tspan><tspan x="33.71" y="0">Thames</tspan><tspan class="f" x="95.12" y="0"> </tspan><tspan class="g" x="99.53" y="0">T</tspan><tspan x="109.29" y="0">ideway</tspan><tspan class="f" x="162.21" y="0"> </tspan><tspan class="g" x="166.62" y="0">T</tspan><tspan x="176.38" y="0">unnel (TTT), at an estimated cost of £4.2 billion, </tspan><tspan x="0" y="26">has the goal to increase the capacity of London</tspan><tspan class="f" x="356.3" y="26">’</tspan><tspan x="359.77" y="26">s existing brick </tspan><tspan class="f" x="475.98" y="26">V</tspan><tspan x="487.01" y="26">ictorian </tspan><tspan x="0" y="52">sewage system to meet the strains it faces toda</tspan><tspan class="c" x="358.11" y="52">y</tspan><tspan x="365.35" y="52">.</tspan><tspan class="f" x="370.07" y="52"> </tspan><tspan x="374.49" y="52">The</tspan><tspan class="f" x="403.78" y="52"> </tspan><tspan x="408.2" y="52">TT</tspan><tspan class="f" x="428.97" y="52">T</tspan><tspan x="439.04" y="52" xml:space="preserve"> will collect and </tspan><tspan x="0" y="78">store the regular overflow of almost 40 million tonnes of rainwater and </tspan><tspan x="0" y="104">sewage each yea</tspan><tspan class="h" x="132.31" y="104">r</tspan><tspan x="137.04" y="104">, before pumping it to a water treatment plant outside </tspan><tspan x="0" y="130">London. Some of the sewage will be used to generate a moderate </tspan><tspan x="0" y="156">amount of methane gas; a renewable form of energ</tspan><tspan class="c" x="386.51" y="156">y</tspan><tspan x="393.75" y="156">.</tspan><tspan class="f" x="398.47" y="156"> </tspan><tspan x="402.89" y="156">The 9-year project </tspan><tspan x="0" y="182">has been scrutinised for failing to consider cheaper and other </tspan><tspan x="0" y="208">environmentally beneficial alternatives, such as resurfacing roads with </tspan><tspan x="0" y="234">porous asphalt, repurposing walls and roof space for gardens and </tspan><tspan x="0" y="260">segregating rainwater from untreated sewage.</tspan></text><rect class="d" width="600" height="340"/></svg>